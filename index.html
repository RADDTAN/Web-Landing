<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEH Group - Url Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全局設定 */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .WEB LANDING-bg {
            background: radial-gradient(circle at center, #4a5568 0%, #1a202c 100%);
        }

        /* WEB LANDING 圓形主按鈕 */
        .WEB LANDING-circle {
            position: relative;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
            flex-shrink: 0;
        }
        .WEB LANDING-circle:hover, .WEB LANDING-circle.active {
            background-color: #f59e0b;
            border-color: #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
        }

        /* WEB LANDING 矩形子選單項目 */
        .WEB LANDING-rect {
            padding: 0.5rem 1rem;
            background-color: rgba(240, 240, 240, 0.95);
            color: #333;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .WEB LANDING-rect:last-child { border-bottom: none; }
        .WEB LANDING-rect:hover, .WEB LANDING-rect.active {
            background-color: #f59e0b;
            color: white;
        }

        /* 左側三角形指針 */
        .WEB LANDING-pointer {
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 8px solid rgba(240, 240, 240, 0.95);
        }
        .WEB LANDING-rect:hover .WEB LANDING-pointer, .WEB LANDING-rect.active .WEB LANDING-pointer {
            border-right-color: #f59e0b;
        }

        /* 展開動畫 */
        .slide-in {
            animation: slideIn 0.2s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* WEB LANDING 風格的滾動條 */
        .WEB LANDING-scrollbar::-webkit-scrollbar { width: 6px; }
        .WEB LANDING-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); border-radius: 3px; }
        .WEB LANDING-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
        .WEB LANDING-scrollbar::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden relative">

    <div id="loading-view" class="absolute inset-0 bg-gray-900 z-50 flex flex-col items-center justify-center text-white">
        <div class="text-3xl font-bold tracking-widest animate-pulse mb-4">SYNCING...</div>
        <div class="text-sm text-gray-400">正在連接至雲端伺服器 (Google Drive)</div>
    </div>

    <div id="front-view" class="h-full w-full WEB LANDING-bg relative hidden">
        
        <div class="relative h-full flex flex-col justify-center items-start pl-8 md:pl-32">
            
            <div id="WEB LANDING-announcement-container" class="mb-6 z-40 hidden w-[85%] max-w-sm md:max-w-md slide-in">
                <div class="bg-white/90 backdrop-blur-sm shadow-[0_0_15px_rgba(255,255,255,0.2)] border-t-4 border-blue-500 rounded-b-sm p-3 flex items-start gap-3 relative">
                    <span class="text-xl pt-1">💬</span>
                    <div>
                        <h3 class="text-blue-600 text-[10px] font-bold uppercase tracking-wider mb-0.5">ANNOUNCEMENT</h3>
                        <p id="WEB LANDING-announcement-text" class="text-sm font-medium text-gray-700 leading-snug break-words"></p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-8 relative z-10">
                
                <div class="relative group">
                    <div id="btn-company" class="WEB LANDING-circle" onclick="toggleMainMenu('company')" title="Company List">🏢</div>
                    
                    <div id="menu-company-wrapper" class="hidden absolute top-0 left-16 md:left-20 flex flex-col gap-3 z-20 w-56 md:w-64">
                        <div class="bg-white/90 shadow-lg rounded-sm slide-in relative before:content-[''] before:absolute before:-left-2 before:top-5 before:border-[6px] before:border-transparent before:border-r-white/90 max-h-[35vh] overflow-y-auto WEB LANDING-scrollbar w-full">
                            <div id="company-list-container" class="flex flex-col"></div>
                        </div>

                        <div id="menu-links-list" class="hidden bg-white/95 shadow-xl rounded-sm slide-in w-full max-h-[288px] overflow-y-auto WEB LANDING-scrollbar border-t-4 border-orange-500 relative before:content-[''] before:absolute before:-top-2 before:left-8 before:border-[6px] before:border-transparent before:border-b-orange-500">
                            <div id="links-list-container" class="flex flex-col"></div>
                        </div>
                    </div>
                </div>

                <div class="relative group">
                    <div class="WEB LANDING-circle" onclick="switchView('login')" title="Admin System">⚙️</div>
                </div>

            </div>
        </div>
    </div>


    <div id="login-view" class="h-full w-full flex items-center justify-center p-4 bg-gray-900 hidden">
        <div class="max-w-sm w-full bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">System Login</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Admin ID</label>
                    <input type="text" id="login-username" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-orange-500 focus:ring-orange-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:border-orange-500 focus:ring-orange-500">
                </div>
                <div class="pt-4 flex justify-between items-center">
                    <button type="button" onclick="switchView('front')" class="text-gray-500 hover:text-gray-800 text-sm font-medium">&larr; Cancel</button>
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded shadow-md transition">Login</button>
                </div>
            </form>
        </div>
    </div>


    <div id="admin-view" class="h-full w-full flex flex-col p-2 sm:p-4 bg-gray-50 hidden overflow-y-auto overflow-x-hidden WEB LANDING-scrollbar">
        <div class="max-w-4xl w-full mx-auto bg-white rounded-xl shadow-lg p-4 md:p-8 my-4 md:my-8">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-6 border-b pb-2 flex justify-between items-center">
                <span>⚙️ System Admin - 种类/公司管理</span>
            </h2>

            <form id="admin-form" class="space-y-6">
                <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <label class="block text-sm font-bold text-blue-800 mb-2">📢 系統頂部公告 (System Announcement)</label>
                    <textarea id="admin-announcement" rows="2" placeholder="請輸入前台的頂部公告... (若留空則前台不顯示)" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500 text-sm"></textarea>
                </div>
            
                <div class="p-3 md:p-4 bg-orange-50 rounded-lg border border-orange-200">
                    <label class="block text-sm font-bold text-gray-700 mb-2">📊 种类/公司 CSV 批次處理</label>
                    <div class="flex flex-wrap gap-2 items-center">
                        <button type="button" onclick="downloadCSV()" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium py-2 px-3 rounded transition shadow-sm">📥 下載 CSV 範本</button>
                        <label class="bg-green-500 hover:bg-green-600 text-white text-sm font-medium py-2 px-3 rounded transition shadow-sm cursor-pointer inline-block">
                            📤 上傳 CSV 更新
                            <input type="file" accept=".csv" class="hidden" onchange="uploadCSV(event)">
                        </label>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-4">
                        <label class="block text-lg font-bold text-gray-700">🏢 企業結構列表</label>
                        <button type="button" onclick="addCompanyCard()" class="bg-gray-800 hover:bg-gray-700 text-white text-sm py-2 px-4 rounded font-bold shadow-md">+ 新增一家公司</button>
                    </div>
                    <div id="admin-companies-container" class="space-y-6 w-full"></div>
                </div>

                <div class="pt-6 mt-4 border-t flex justify-between items-center sticky bottom-0 bg-white py-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] -mx-4 md:-mx-8 px-4 md:px-8 z-10">
                    <button type="button" onclick="switchView('front')" class="text-gray-500 hover:text-gray-800 font-medium text-sm md:text-base">&larr; 返回</button>
                    <button id="save-btn" type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 md:py-3 px-4 md:px-8 rounded shadow-md transition text-base md:text-lg">儲存全部設定</button>
                </div>
            </form>
        </div>
    </div>


    <script>
        // 綁定你的 Google Apps Script 網址
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbyeXrnekShV68CQgAPXh7BwPH7lkwExi-VHj2p4Xqtr6eHGcLcMEGLu3hdzROw-icV8hA/exec';

        // 管理員密碼
        const ADMIN_USER = "Radd";
        const ADMIN_PASS = "1016";

        // 全域變數快取資料
        let appData = { announcement: "", companies: [] };
        
        // 狀態控制
        let isCompanyMenuOpen = false;
        let activeCompanyIndex = null;

        // --- 從 Google Drive 讀取資料 ---
        async function fetchFromGoogle() {
            try {
                const response = await fetch(GOOGLE_API_URL);
                const data = await response.json();
                if (data) {
                    appData = {
                        announcement: data.announcement || "",
                        companies: data.companies || []
                    };
                }
            } catch (err) {
                console.error("載入失敗：", err);
                appData = { announcement: "無法連線至雲端資料庫，請稍後再試。", companies: [] };
            }
        }

        // --- 前台渲染邏輯 ---
        function renderAnnouncement() {
            const container = document.getElementById('WEB LANDING-announcement-container');
            const textEl = document.getElementById('WEB LANDING-announcement-text');
            const annText = appData.announcement;

            if (annText && annText.trim() !== "") {
                textEl.innerText = annText;
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function toggleMainMenu(menuName) {
            if (menuName === 'company') {
                isCompanyMenuOpen = !isCompanyMenuOpen;
                const btn = document.getElementById('btn-company');
                const wrapper = document.getElementById('menu-company-wrapper');
                
                if (isCompanyMenuOpen) {
                    btn.classList.add('active');
                    wrapper.classList.remove('hidden');
                    activeCompanyIndex = null; 
                    renderCompanyList();
                } else {
                    btn.classList.remove('active');
                    wrapper.classList.add('hidden');
                }
            }
        }

        function toggleSubMenu2(index, event) {
            event.stopPropagation();
            activeCompanyIndex = (activeCompanyIndex === index) ? null : index;
            renderCompanyList();
        }

        function renderCompanyList() {
            const container = document.getElementById('company-list-container');
            const linksPanel = document.getElementById('menu-links-list');
            const linksContainer = document.getElementById('links-list-container');
            
            container.innerHTML = '';
            linksContainer.innerHTML = '';

            appData.companies.forEach((comp, index) => {
                const isActive = (activeCompanyIndex === index);
                
                const rectHTML = `
                    <div class="WEB LANDING-rect ${isActive ? 'active' : ''}" onclick="toggleSubMenu2(${index}, event)">
                        <div class="WEB LANDING-pointer"></div>
                        <span class="truncate w-full pr-2" title="${comp.name}">${comp.name}</span>
                        <div class="flex items-center gap-1 shrink-0">
                            <span class="text-[10px] bg-gray-200 text-gray-600 px-1.5 rounded-full ${isActive ? 'text-gray-800' : ''}">${comp.links.length}</span>
                            <span class="text-xs transition-transform duration-200 ${isActive ? 'opacity-100 rotate-90' : 'opacity-50'}">▶</span>
                        </div>
                    </div>
                `;
                container.innerHTML += rectHTML;

                if (isActive && comp.links.length > 0) {
                    comp.links.forEach(link => {
                        linksContainer.innerHTML += `
                            <a href="${link.url}" target="_blank" class="block px-4 py-3 text-gray-800 hover:bg-orange-500 hover:text-white transition-colors border-b border-gray-200 last:border-b-0 font-medium border-l-4 border-transparent hover:border-orange-700 flex justify-between items-center group">
                                <span class="truncate pr-2">${link.title}</span>
                                <span class="opacity-0 group-hover:opacity-100 transition-opacity">🔗</span>
                            </a>
                        `;
                    });
                }
            });

            if (activeCompanyIndex !== null && appData.companies[activeCompanyIndex].links.length > 0) {
                linksPanel.classList.remove('hidden');
            } else {
                linksPanel.classList.add('hidden');
            }
        }

        // --- 畫面切換 ---
        function switchView(view) {
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('front-view').classList.add('hidden');
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');

            if (view === 'login') {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('login-username').value = '';
                document.getElementById('login-password').value = '';
            } else if (view === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
                renderAdmin(); 
            } else {
                document.getElementById('front-view').classList.remove('hidden');
                isCompanyMenuOpen = false;
                activeCompanyIndex = null;
                document.getElementById('btn-company').classList.remove('active');
                document.getElementById('menu-company-wrapper').classList.add('hidden');
                document.getElementById('menu-links-list').classList.add('hidden');
                renderAnnouncement(); 
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('login-username').value === ADMIN_USER && 
                document.getElementById('login-password').value === ADMIN_PASS) {
                switchView('admin');
            } else {
                alert("❌ Login Failed!");
            }
        });

        // --- 後台管理 ---
        function renderAdmin() {
            document.getElementById('admin-announcement').value = appData.announcement !== undefined ? appData.announcement : "";

            const container = document.getElementById('admin-companies-container');
            container.innerHTML = '';
            
            if (appData.companies.length === 0) {
                addCompanyCard();
            } else {
                appData.companies.forEach(comp => addCompanyCard(comp));
            }
        }

        function addCompanyCard(compData = { name: '', links: [{ title: '', url: '' }] }) {
            const container = document.getElementById('admin-companies-container');
            const card = document.createElement('div');
            card.className = "company-card bg-white border border-gray-200 rounded-lg p-3 md:p-5 relative shadow-sm hover:shadow-md transition w-full overflow-hidden";
            
            card.innerHTML = `
                <div class="flex justify-between items-center mb-2 gap-2">
                    <label class="block text-sm font-bold text-indigo-700">🏢 种类/公司</label>
                    <button type="button" onclick="this.closest('.company-card').remove()" class="text-gray-400 hover:text-red-500 transition font-bold text-xs md:text-sm">✕ 刪除公司</button>
                </div>
                <input type="text" class="company-name w-full border border-gray-300 rounded-md p-2 mb-4 focus:ring-indigo-500 focus:border-indigo-500 font-bold" value="${compData.name}" placeholder="輸入公司名稱..." required>
                
                <div class="bg-gray-50 p-3 md:p-4 rounded border border-gray-100">
                    <label class="block text-sm font-bold text-gray-600 mb-2">🔗 關聯系統/網站連結 (不限數量)</label>
                    <div class="links-container space-y-2"></div>
                    <button type="button" class="mt-3 text-xs md:text-sm bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-1.5 px-3 rounded flex items-center gap-1 transition" onclick="addLinkRow(this.previousElementSibling)">
                        <span>+</span> 加入新連結
                    </button>
                </div>
            `;
            
            container.appendChild(card);
            
            const linksContainer = card.querySelector('.links-container');
            if(compData.links && compData.links.length > 0) {
                compData.links.forEach(link => addLinkRow(linksContainer, link.title, link.url));
            } else {
                addLinkRow(linksContainer); 
            }
        }

        function addLinkRow(container, title = '', url = '') {
            const row = document.createElement('div');
            row.className = 'link-row flex flex-wrap gap-2 items-center bg-white p-2 border border-gray-200 rounded w-full';
            row.innerHTML = `
                <input type="text" placeholder="顯示名稱" value="${title}" required class="link-title flex-1 min-w-[120px] w-full md:w-auto border border-gray-300 p-1.5 rounded text-sm focus:border-orange-500 focus:outline-none">
                <input type="text" placeholder="網址 (https://...)" value="${url}" required class="link-url flex-[2] min-w-[180px] w-full md:w-auto border border-gray-300 p-1.5 rounded text-sm focus:border-orange-500 focus:outline-none">
                <button type="button" onclick="this.parentElement.remove()" class="text-gray-400 hover:text-red-500 p-1 font-bold ml-auto" title="移除">✕</button>
            `;
            container.appendChild(row);
        }

        // 儲存資料至 Google Drive (Apps Script)
        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "☁️ 寫入雲端硬碟中...";
            btn.disabled = true;

            const announcementText = document.getElementById('admin-announcement').value.trim();
            const cards = document.querySelectorAll('.company-card');
            const newCompanies = [];
            
            cards.forEach(card => {
                const name = card.querySelector('.company-name').value.trim();
                if (!name) return; 
                
                const linkRows = card.querySelectorAll('.link-row');
                const links = [];
                
                linkRows.forEach(row => {
                    const title = row.querySelector('.link-title').value.trim();
                    const url = row.querySelector('.link-url').value.trim();
                    if (title && url) links.push({ title, url });
                });

                if(links.length > 0) {
                    newCompanies.push({ name, links });
                }
            });

            const finalData = { announcement: announcementText, companies: newCompanies };

            try {
                // 使用 mode: 'no-cors' 避免 Google POST Redirect 時產生的跨域錯誤
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(finalData)
                });
                
                // 因為 no-cors 無法讀取回傳結果，只要沒報錯就當作成功更新本地狀態
                appData = finalData; 
                alert("✅ 系統設定已成功更新至 Google Drive！");
                switchView('front');
            } catch (err) {
                alert("❌ 儲存失敗：" + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // --- CSV 處理 ---
        function downloadCSV() {
            const headers = ["Company", "LinkTitle", "URL"];
            const rows = [];

            appData.companies.forEach(comp => {
                const cName = comp.name.replace(/"/g, '""');
                comp.links.forEach(link => {
                    const lTitle = link.title.replace(/"/g, '""');
                    const lUrl = link.url.replace(/"/g, '""');
                    rows.push(`"${cName}","${lTitle}","${lUrl}"`);
                });
            });

            const csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "WEB LANDING_hub_template.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function uploadCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = parseCSV(text);

                if (lines.length < 2) {
                    alert("❌ CSV 格式錯誤或內容為空！");
                    return;
                }

                const tempMap = {};
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    if (row.length >= 3 && row[0].trim() !== '') {
                        const compName = row[0].trim();
                        const linkTitle = row[1].trim();
                        const linkUrl = row[2].trim();
                        
                        if (linkTitle && linkUrl) {
                            if (!tempMap[compName]) tempMap[compName] = [];
                            tempMap[compName].push({ title: linkTitle, url: linkUrl });
                        }
                    }
                }

                const newCompanies = Object.keys(tempMap).map(key => {
                    return { name: key, links: tempMap[key] };
                });

                if (newCompanies.length === 0) {
                    alert("❌ 未讀取到有效的連結資料！");
                    return;
                }

                const container = document.getElementById('admin-companies-container');
                container.innerHTML = '';
                newCompanies.forEach(comp => addCompanyCard(comp));

                alert(`📥 成功解析並合併為 ${newCompanies.length} 家公司資料，請點擊最下方「儲存全部設定」寫入資料庫！`);
                event.target.value = ''; 
            };
            reader.readAsText(file, "UTF-8");
        }

        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                let next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    if (row.join('') !== '') lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.join('') !== '') lines.push(row);
            return lines;
        }

        // ================= 系統啟動 =================
        async function bootSystem() {
            await fetchFromGoogle(); // 呼叫 Google API 抓取資料
